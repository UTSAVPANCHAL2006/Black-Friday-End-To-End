name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      # Uncomment the following lines if you want to push to DockerHub
      # uses: docker/login-action@v3
      # with:
      #   username: ${{ secrets.DOCKERHUB_USERNAME }}
      #   password: ${{ secrets.DOCKERHUB_TOKEN }}
      run: echo "Replace this step with login action and secrets to push the image."

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to true when you configure login
        tags: your-dockerhub-username/user-purchase-prediction:latest
